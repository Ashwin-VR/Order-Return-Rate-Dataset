<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReturnIQ ERP — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .login-brand {
            font-size: 22px;
            font-weight: 700;
            color: #1E293B;
            letter-spacing: -0.5px;
        }

        .login-sub {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            color: #1E293B;
            background: white;
            transition: all 0.15s;
            outline: none;
        }

        .form-control:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .form-control {
            padding-right: 44px;
        }

        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #64748B;
            padding: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3B82F6;
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #2563EB;
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #94A3B8;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">📦</div>
            <div class="login-brand">ReturnIQ ERP</div>
            <div class="login-sub">Supply Chain Intelligence Platform</div>
        </div>

        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrap">
                <input type="password" id="password" class="form-control" placeholder="Enter password"
                    autocomplete="current-password">
                <button class="eye-toggle" id="eyeToggle" type="button" title="Toggle password">👁</button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn" type="button">
            <span id="loginBtnText">Sign In</span>
        </button>

        <div class="error-msg" id="errorMsg"></div>

        <div class="login-footer">ReturnIQ v1.0 · Powered by Oracle 23ai + ML</div>
    </div>

    <script>
        const usernameEl = document.getElementById('username');
        const passwordEl = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const eyeToggle = document.getElementById('eyeToggle');
        const loginBtnText = document.getElementById('loginBtnText');

        eyeToggle.addEventListener('click', () => {
            const isHidden = passwordEl.type === 'password';
            passwordEl.type = isHidden ? 'text' : 'password';
            eyeToggle.textContent = isHidden ? '🙈' : '👁';
        });

        async function doLogin() {
            const username = usernameEl.value.trim();
            const password = passwordEl.value;
            if (!username || !password) {
                showError('Please enter username and password.');
                return;
            }
            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<div class="spinner"></div>';
            errorMsg.classList.remove('show');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showError('Invalid credentials. Please try again.');
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'Sign In';
                }
            } catch {
                showError('Connection error. Please try again.');
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        loginBtn.addEventListener('click', doLogin);
        [usernameEl, passwordEl].forEach(el => {
            el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        });
    </script>
</body>

</html>
